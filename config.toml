[camera]
source = 0        # 카메라 인덱스 또는 파일 경로
width = 640
height = 480
fps = 30
hfov = 75         # 수평 시야각 (도) — Pi Camera Module 3 기준

[lidar]
port = "/dev/ttyUSB0"
baudrate = 115200
angle_offset = 0.0   # 설치 방향 보정 (도)
reverse = false      # 뒤집어 설치한 경우 true

[yolo]
model_path = "/usr/share/hailo-models/yolov8s_h8l.hef"
conf_threshold = 0.4
device = "npu"
show_window = false   # 디버그용 — cv2.imshow 로 감지 결과 시각화 (false 로 끄면 오버헤드 0)
